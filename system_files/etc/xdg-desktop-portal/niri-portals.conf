# Override of /usr/share/xdg-desktop-portal/niri-portals.conf (from the niri
# package). The only change is the Secret backend: the niri default points it at
# gnome-keyring, which tishy does not install -- so Brave/Chromium's portal-based
# os_crypt key retrieval failed and it lost saved logins every session. Point it
# at kwallet (the KWallet portal backend, kwallet.portal) so it uses the same
# already-running, already-unlocked wallet as the KDE session. screencast etc.
# stay on gnome (xdg-desktop-portal-gnome); file chooser / access on gtk.
[preferred]
default=gnome;gtk;
org.freedesktop.impl.portal.Access=gtk;
org.freedesktop.impl.portal.Notification=gtk;
org.freedesktop.impl.portal.Secret=kwallet;
